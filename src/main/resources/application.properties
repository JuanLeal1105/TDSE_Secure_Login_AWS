spring.application.name=secure-login-app
server.port=8080

# ?? Database ??????????????????????????????????????????????????
# Local (no Docker): H2 in-memory, zero configuration needed.
# Docker:            DB_USER and DB_PASSWORD are injected from .env.
#                    DB_URL and DB_DRIVER are overridden in docker-compose.yml.
spring.datasource.url=jdbc:h2:mem:securelogindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# ?? JPA / Hibernate ???????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ?? H2 Console (local dev ? http://localhost:8080/h2-console) ?
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? JWT ???????????????????????????????????????????????????????
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# ?? CORS ??????????????????????????????????????????????????????
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ?? Logging ???????????????????????????????????????????????????
logging.level.com.securelogin=DEBUG
logging.level.org.springframework.security=INFO