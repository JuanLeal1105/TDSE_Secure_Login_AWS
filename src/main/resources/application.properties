spring.application.name=secure-login-app
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:mem:securelogindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=${SHOW_SQL:true}

spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

spring.datasource.hikari.maximum-pool-size=${POOL_MAX:5}
spring.datasource.hikari.minimum-idle=${POOL_MIN:1}
spring.datasource.hikari.connection-timeout=30000

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://127.0.0.1}


logging.level.com.securelogin=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}